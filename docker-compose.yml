version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: queueless-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - queueless-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: queueless-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/queless
      - JWT_SECRET=queueless_jwt_secret_key_2024
      - NODE_ENV=production
      - CLIENT_URL=http://localhost
    depends_on:
      - mongo
    networks:
      - queueless-network

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: queueless-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - queueless-network

volumes:
  mongo_data:
    driver: local

networks:
  queueless-network:
    driver: bridge
