name: QueueLess CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Backend CI
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Check for syntax errors
        working-directory: ./backend
        run: node --check server.js

      - name: Verify all imports
        working-directory: ./backend
        run: |
          node --check config/db.js
          node --check models/User.js
          node --check models/Service.js
          node --check models/Queue.js
          node --check middleware/auth.js
          node --check middleware/roleAuth.js
          node --check controllers/authController.js
          node --check controllers/serviceController.js
          node --check controllers/queueController.js
          node --check routes/authRoutes.js
          node --check routes/serviceRoutes.js
          node --check routes/queueRoutes.js

  # Frontend CI
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  # Docker Build Check
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t queueless-backend ./backend

      - name: Build frontend Docker image
        run: docker build -f docker/frontend.Dockerfile -t queueless-frontend ./frontend
